<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="cal.css">
</head>
<body>
    <div id="calculator">
        <input type="text" id="display" readonly>
<div class="button-container" >
    <div class="row1" >
<button class="button" onclick="currentDisplay =''; document.querySelector('#display').value =currentDisplay;">AC</button>                
<button class="button" onclick="currentDisplay = currentDisplay/100; document.querySelector('#display').value =currentDisplay;">%</button> 
<button class="button" onclick="
currentDisplay = currentDisplay + '+/-';
document.querySelector('#display').value = currentDisplay;
">+/-</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '/';
document.querySelector('#display').value = currentDisplay;
">÷</button></div>

 <div class="row2" >
<button class="button" onclick="
      currentDisplay = currentDisplay + '1';
      document.querySelector('#display').value = currentDisplay;
      ">1</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '2';
document.querySelector('#display').value = currentDisplay;
">2</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '3';
document.querySelector('#display').value = currentDisplay;
">3</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '+';
document.querySelector('#display').value = currentDisplay;
">+</button></div>

<div class="row3" >
<button class="button" onclick="
currentDisplay = currentDisplay + '4';
document.querySelector('#display').value = currentDisplay;
">4</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '5';
document.querySelector('#display').value = currentDisplay;
">5</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '6';
document.querySelector('#display').value = currentDisplay;
">6</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '-';
document.querySelector('#display').value = currentDisplay;
">-</button></div>

<div class="row4" >
<button class="button" onclick="
currentDisplay = currentDisplay + '7';
document.querySelector('#display').value = currentDisplay;
">7</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '8';
document.querySelector('#display').value = currentDisplay;
">8</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '9';
document.querySelector('#display').value = currentDisplay;
">9</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '*';
document.querySelector('#display').value = currentDisplay;
">×</button></div>

<div class="row5" >
<button class="button" onclick="
currentDisplay = currentDisplay + 'x<sup>2<sup>';
document.querySelector('#display').value = currentDisplay;
">x<sup>2</sup></button>
<button class="button" onclick="
currentDisplay = currentDisplay + '0';
document.querySelector('#display').value = currentDisplay;
">0</button>
<button class="button" onclick="
currentDisplay = currentDisplay + '.';
document.querySelector('#display').value = currentDisplay;
">.</button>
<button style="background-color:blue;" class="button"onclick="
currentDisplay = eval(currentDisplay);
document.querySelector('#display').value = currentDisplay;
">=</button>
</div>
        </div>
    </div>
<script>
    let percent=''
    let currentDisplay = '';
    document.querySelector('#display').value = currentDisplay;
</script>
    
</body>
</html>
